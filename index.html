<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khaira Sleep Quality Checker™</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#f0f0f0;
    min-height:80px;
}
</style>
</head>

<body>

<div class="container">

<h1>😴 Khaira Sleep Quality Checker™</h1>

<p>
Selamat datang di sistem pendeteksi begadang Khaira.
</p>

<p>
Silakan pilih aktivitas semalam:
</p>

<button onclick="checkSleep('early')">
🔵 Tidur sebelum jam 10
</button>

<button onclick="checkSleep('mid')">
🟡 Tidur jam 12
</button>

<button onclick="checkSleep('late')">
🔴 Tidur jam 2 pagi
</button>

<button onclick="checkSleep('none')">
☠️ Tidak tidur sama sekali
</button>

<div class="result" id="result">
Pilih salah satu tombol di atas 😭
</div>

</div>

<script>

function checkSleep(type){

const result = document.getElementById("result");

if(type === "early"){
result.innerHTML = `
<h2>😎 Mantap</h2>
HP +10%<br>
Mood +15%<br>
Risiko diomelin Bii: 0%
`;
}

if(type === "mid"){
result.innerHTML = `
<h2>🙂 Masih Aman</h2>
Tidur jam 12 masih oke.<br>
Tapi jangan dibiasakan yaa 😭
`;
}

if(type === "late"){
result.innerHTML = `
<h2>⚠️ ALERT</h2>
Mental debuff terdeteksi.<br>
Risiko ngantuk siang hari meningkat.<br><br>
Bii tidak merekomendasikan ini 😭
`;
}

if(type === "none"){
result.innerHTML = `
<h2>🚨 EMERGENCY</h2>
Khaira.exe has stopped working.<br><br>
Segera makan 🍖<br>
Segera tidur 😭<br>
Segera sentuh kasur.
`;
}

}

</script>

</body>
</html>
